name: Draft Github Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to create (e.g. v0.4.0). Must include 'v' and must match pubspec"
        required: true
        default: "v0.4.0"
        type: string

permissions: read-all

jobs:
  create-build:
    name: Create android build
    runs-on: ubuntu-latest
    outputs:
      apk_path: ${{ steps.rename_build.outputs.path }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Checkout mobile code
        uses: actions/checkout@v4

      - name: Show Flutter environment
        run: |
          echo "::group::Flutter Doctor"
          flutter doctor -v
          echo "::endgroup::"

      - name: Clean project
        run: flutter clean

      - name: Delete pubspec.lock
        run: rm -f pubspec.lock

      - name: Install dependencies
        run: |
          echo "::group::Flutter Pub Get"
          flutter pub get
          echo "::endgroup::"

      - name: Clean build_runner cache
        run: dart run build_runner clean

      - name: Code generation
        run: |
          echo "::group::Build Runner"
          dart run build_runner build --delete-conflicting-outputs
          echo "::endgroup::"
          
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create Keystore Properties
        run: echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: Build Release APK
        run: flutter build apk --release --dart-define=LICHESS_HOST=lichess.org

      - name: Rename build
        id: rename_build
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/lichess-mobile.apk
          echo "path=$GITHUB_WORKSPACE/lichess-mobile.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.rename_build.outputs.path }}

